
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HGT Market – Kurumsal Sürüm</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f5f7fa;
            color: #222;
        }

        /* HEADER */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
        }

        .logo .g-badge {
            background: linear-gradient(135deg, #ff8a00, #e52e71);
            padding: 4px 10px;
            border-radius: 10px;
            color: white;
            box-shadow: 0 0 12px rgba(255, 0, 120, 0.6);
        }

        nav a {
            margin-left: 25px;
            text-decoration: none;
            color: #333;
            font-weight: 600;
            transition: 0.3s;
        }

        nav a:hover {
            color: #e52e71;
        }

        /* HERO */
        .hero {
            padding-top: 160px;
            text-align: center;
            padding-bottom: 80px;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
        }

        .hero h1 {
            font-size: 64px;
            font-weight: 900;
            margin-bottom: 10px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .hero p {
            font-size: 22px;
            opacity: 0.9;
            margin-bottom: 30px;
        }

        .hero .btn {
            padding: 16px 34px;
            background: linear-gradient(135deg, #ff8a00, #e52e71);
            color: white;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            text-decoration: none;
            box-shadow: 0 6px 18px rgba(0,0,0,0.25);
            transition: 0.3s;
        }

        .hero .btn:hover {
            transform: scale(1.07);
        }

        /* FEATURES */
        .features {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 80px 20px;
        }

        .feature-card {
            background: white;
            width: 300px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            transition: 0.3s;
        }

        .feature-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        .feature-card h3 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .feature-card p {
            font-size: 16px;
            opacity: 0.8;
        }

        /* FOOTER */
        footer {
            background: #111;
            color: #ccc;
            text-align: center;
            padding: 30px;
            margin-top: 60px;
        }

        footer p {
            margin: 5px 0;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header>
        <div class="logo">
            H<span class="g-badge">G</span>T
        </div>

        <nav>
            <a href="#">Ana Sayfa</a>
            <a href="#">Hakkında</a>
            <a href="#">İletişim</a>
        </nav>
    </header>

    <!-- HERO -->
    <section class="hero">
        <h1>HGT Market</h1>
        <p>Modern, renkli ve global bir alışveriş deneyimi.</p>
        <a class="btn">Hazırlanıyor...</a>
    </section>

    <!-- FEATURES -->
    <section class="features">
        <div class="feature-card">
            <h3>🚀 Hızlı</h3>
            <p>HGT altyapısı ile yüksek performans.</p>
        </div>

        <div class="feature-card">
            <h3>🎨 Modern</h3>
            <p>Renkli, şık ve premium tasarım.</p>
        </div>

        <div class="feature-card">
            <h3>🔒 Güvenli</h3>
            <p>Gelişmiş güvenlik standartları.</p>
        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 HGT Market</p>
        <p>Tüm hakları saklıdır.</p>
    </footer>

</body>
</html>
