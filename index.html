<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="Lw2FLx6g2zX-3QPYkEUeKm2G-i5japJbjRbdg6lcsfE" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HGT Market – Modern Alışveriş Deneyimi</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            text-align: center;
        }

        .container {
            padding: 120px 20px;
        }

        h1 {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-shadow: 0 4px 12px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 20px;
            opacity: 0.9;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            color: #333;
            width: 90%;
            max-width: 420px;
            margin: auto;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: fadeIn 1.2s ease;
        }

        .card p {
            font-size: 18px;
            margin: 10px 0;
        }

        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 14px 28px;
            background: linear-gradient(135deg, #ff8a00, #e52e71);
            color: white;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            text-decoration: none;
            box-shadow: 0 6px 18px rgba(0,0,0,0.25);
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.07);
            box-shadow: 0 10px 25px rgba(0,0,0,0.35);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>HGT Market</h1>
        <div class="subtitle">Modern, renkli ve yepyeni alışveriş deneyimi yakında sizlerle.</div>

        <div class="card">
            <p>Sistem şu anda yapım aşamasındadır.</p>
            <p>HGT hamlesi ile çok daha güçlü bir platform geliyor.</p>
            <a class="btn">Hazırlanıyor...</a>
        </div>
    </div>
</body>
</html>
